<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel do Prestador de Serviço</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; padding: 40px; }
        .container { background-color: #2b2b2b; padding: 30px; border-radius: 10px; max-width: 600px; margin: 0 auto; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5); border-top: 5px solid #17a2b8; }
        button { width: 100%; padding: 15px; margin: 10px 0; background-color: #17a2b8; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #117a8b; }
        .form-sair { text-align: right; margin-top: 20px; }
        .sair { background-color: #8d1f1f; width: auto; padding: 10px 20px; margin: 0; display: inline-block; }
        .sair:hover { background-color: #631414; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Área do Prestador de Serviços</h2>
        <p>Acompanhe os reparos que foram atribuídos a você pela imobiliária.</p>
        
        <form action="/meus_servicos" method="GET">
            <button type="submit">🛠️ Ver Meus Serviços Atribuídos</button>
        </form>
        
        <form action="/" method="GET" class="form-sair">
            <button type="submit" class="sair">Sair</button>
        </form>
    </div>
</body>
</html>
