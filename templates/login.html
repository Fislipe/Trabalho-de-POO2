<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Reparos</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #1a1a1a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .caixa-login { 
            background-color: #2b2b2b; 
            padding: 40px; 
            border-radius: 10px; 
            width: 320px; 
            text-align: center; 
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 5px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #1f538d; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { 
            background-color: #143a63; 
        }
        .dica {
            color: gray; 
            font-size: 12px; 
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="caixa-login">
        <h2>Acesso ao Sistema</h2>
        <form action="/autenticar" method="POST">
            <input type="text" name="usuario" placeholder="Digite seu Usuário ou E-mail" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p class="dica">Testes rápidos: imobiliaria | inquilino | proprietario | prestador</p>
    </div>
</body>
</html>
