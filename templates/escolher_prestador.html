<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Selecionar Prestador</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; padding: 40px; display: flex; justify-content: center; }
        .container { background-color: #2b2b2b; padding: 30px; border-radius: 10px; width: 500px; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5); border-top: 5px solid #1f538d; }
        .info-chamado { background-color: #3b3b3b; padding: 15px; margin-bottom: 20px; border-radius: 8px; font-size: 14px; }
        .info-chamado h3 { margin: 0 0 10px 0; color: #1f538d; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        select { width: 100%; padding: 10px; background-color: #3b3b3b; color: white; border: 1px solid #555; border-radius: 5px; font-size: 16px; }
        .btn-enviar { background-color: #1f538d; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .btn-enviar:hover { background-color: #143a63; }
        .btn-cancelar { background-color: #555; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; text-align: center; display: block; text-decoration: none; box-sizing: border-box; }
        .btn-cancelar:hover { background-color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Atribuir Prestador de Serviço</h2>
        <p style="color: gray; font-size: 14px;">Selecione o profissional que cuidará desta manutenção.</p>
        
        <div class="info-chamado">
            <h3>{{ chamado.titulo }}</h3>
            <p><strong>Descrição:</strong> {{ chamado.descricao }}</p>
            <p><strong>Solicitante:</strong> {{ chamado.criado_por }}</p>
        </div>

        <form action="/escolher_prestador/{{ chamado.id }}" method="POST">
            <div class="form-group">
                <label for="prestador_email">Prestadores Disponíveis:</label>
                <select name="prestador_email" id="prestador_email" required>
                    <option value="" disabled selected>-- Escolha um profissional --</option>
                    {% for p in prestadores %}
                        <option value="{{ p.email }}">{{ p.nome }} ({{ p.email }})</option>
                    {% else %}
                        <option value="" disabled>Nenhum prestador cadastrado</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn-enviar">Confirmar Atribuição</button>
            <a href="/chamados" class="btn-cancelar">Cancelar</a>
        </form>
    </div>
</body>
</html>
